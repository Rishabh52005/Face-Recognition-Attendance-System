{% extends "base.html" %}

{% block title %}Register Student{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="hero-content">
        <h1><i class="fas fa-user-plus"></i> Register New Student</h1>
        <p>Add student and capture face encoding</p>
    </div>
</div>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data" class="modern-form">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Student Name</label>
            <input type="text" name="name" required placeholder="Enter full name">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-id-card"></i> Roll Number</label>
            <input type="text" name="roll_no" required placeholder="Enter roll number">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-image"></i> Face Image (JPG/PNG)
                <span class="file-info">Upload clear frontal face image (one face preferred)</span>
            </label>
            <input type="file" name="image" accept="image/*" required>
            <div class="upload-preview">
                <img id="preview" style="display:none;">
            </div>
        </div>
        
        <button type="submit" class="btn-primary">
            <i class="fas fa-save"></i> Register Student
        </button>
    </form>
</div>

<script>
document.querySelector('input[type="file"]').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview').src = e.target.result;
            document.getElementById('preview').style.display = 'block';
        }
        reader.readAsDataURL(file);
    }
});
</script>
{% endblock %}
