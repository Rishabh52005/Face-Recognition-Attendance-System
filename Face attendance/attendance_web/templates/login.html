<!DOCTYPE html>
{% extends "base.html" %}

{% block title %}Login - Face Attendance System{% endblock %}

{% block content %}
<div class="auth-container glassmorphism">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <div class="logo-circle">
                <i class="fas fa-user-friends"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to continue managing attendance</p>
        </div>
        
        <form method="POST" class="modern-form">
            <div class="form-group floating-label">
                <input type="email" name="email" id="login-email" placeholder=" " required>
                <label for="login-email">
                    <i class="fas fa-envelope"></i>
                    Email Address
                </label>
            </div>
            
            <div class="form-group floating-label">
                <input type="password" name="password" id="login-password" placeholder=" " required>
                <label for="login-password">
                    <i class="fas fa-lock"></i>
                    Password
                </label>
            </div>
            
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" name="remember">
                    <span class="checkmark"></span>
                    Remember me
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn-primary gradient">
                <span class="btn-text">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </span>
                <span class="btn-loader hidden">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
            </button>
        </form>
        
        <div class="divider">
            <span>or</span>
        </div>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('signup') }}" class="signup-link">Create one now</a></p>
        </div>
    </div>
</div>
{% endblock %}
